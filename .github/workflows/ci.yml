# OPTIMIZED_BY_CODEX_STEP_4
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff Lint
        run: |
          ruff check app scripts tests

      - name: Run Pytest
        run: |
          pytest -q

  docker_build:
    runs-on: ubuntu-latest
    needs: lint_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t paperrag-ci:latest .
# STEP_4_SUMMARY: Added CI workflow with ruff, pytest, and docker build validation.
